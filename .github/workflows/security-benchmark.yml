name: Security Benchmark

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 1'

jobs:
  security-benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run security benchmark
        run: npm run bench:security

      - name: Generate benchmark figures
        run: npm run bench:figures

      - name: Upload security benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-benchmark-results
          path: |
            benchmarks/results/security-benchmark.md
            benchmarks/results/security-benchmark.json
            figures/security-benchmark-chart.svg
          if-no-files-found: error
